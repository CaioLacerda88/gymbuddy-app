name: gymbuddy_app
description: "GymBuddy - Track every rep, every time."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.0
  go_router: ^17.0.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  flutter_dotenv: ^5.1.0
  flutter_markdown_plus: ^1.0.3
  flutter_svg: ^2.0.10+1
  intl: ^0.20.0
  uuid: ^4.5.1
  wakelock_plus: ^1.2.8
  sentry_flutter: ^9.16.1
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.5
  fake_async: ^1.3.3
  # Exposed directly by wakelock_plus for testing — we reference
  # WakelockPlusPlatformInterface from test fakes.
  wakelock_plus_platform_interface: ^1.4.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/legal/

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: "ic_launcher"
  min_sdk_android: 21
  remove_alpha_ios: false
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#0F0F1A"
    theme_color: "#00E676"

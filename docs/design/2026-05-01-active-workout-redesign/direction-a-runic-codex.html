<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Direction A — Runic Codex</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --abyss:   #0D0319;
    --surface: #1A0F2E;
    --surface2:#241640;
    --pv:      #6A2FA8;
    --hv:      #B36DFF;
    --gold:    #FFB800;
    --cream:   #EEE7FA;
    --dim:     #9C8DB8;
    --success: #62C46D;
    --hair:    rgba(179,109,255,0.14);
    --error:   #FF6B6B;
  }

  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 24px 0;
    font-family: 'Inter', sans-serif;
  }

  .phone-frame {
    width: 390px;
    min-height: 844px;
    background: var(--abyss);
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 0 0 8px #1a1a1a, 0 24px 80px rgba(0,0,0,0.8);
    position: relative;
    padding-bottom: 32px;
  }

  .status-bar {
    height: 44px;
    background: var(--abyss);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 12px;
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
  }

  .appbar {
    padding: 0 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .appbar-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--cream);
    letter-spacing: 0.04em;
  }
  .appbar-sub {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .appbar-actions {
    display: flex;
    gap: 4px;
  }
  .appbar-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim);
    font-size: 18px;
    cursor: pointer;
    border-radius: 8px;
  }

  /* Exercise card */
  .exercise-card {
    margin: 0 16px 12px;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--hair);
    overflow: hidden;
  }

  /* Card header — runic title band */
  .card-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--hair);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .exercise-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  /* Rune glyph accent before exercise name */
  .rune-mark {
    font-size: 10px;
    color: var(--pv);
    letter-spacing: 0;
    line-height: 1;
  }
  .exercise-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--cream);
    letter-spacing: 0.02em;
  }
  .exercise-info {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim);
    font-size: 13px;
    border: 1px solid var(--hair);
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
  }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .header-icon-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim);
    font-size: 16px;
    cursor: pointer;
  }

  /* Set rows */
  .sets-body {
    padding: 4px 0 0;
  }

  .set-row {
    display: flex;
    align-items: stretch;
    min-height: 56px;
    position: relative;
    transition: background 0.2s;
  }
  .set-row:not(:last-child) {
    border-bottom: 1px solid var(--hair);
  }
  .set-row.completed {
    background: rgba(36,22,64,0.6);
  }
  /* Sealing mark for completed rows: left violet bar */
  .set-row.completed::before {
    content: '';
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 3px;
    background: var(--success);
    border-radius: 0 2px 2px 0;
  }

  /* Set number column */
  .set-num-col {
    width: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0 4px;
    cursor: pointer;
    position: relative;
  }
  .set-num {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 22px;
    line-height: 1;
    color: var(--hv);
  }
  .set-row.completed .set-num {
    color: var(--dim);
  }
  .set-type-glyph {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    margin-top: 2px;
  }
  /* Dotted underline on set number (copy hint) */
  .set-num-underline {
    width: 22px;
    height: 1px;
    border-bottom: 1px dotted var(--pv);
    margin-top: 1px;
    opacity: 0.6;
  }

  /* Data columns */
  .data-cols {
    flex: 1;
    display: flex;
    align-items: stretch;
  }
  .weight-col {
    flex: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    cursor: pointer;
    border-right: 1px solid var(--hair);
  }
  .reps-col {
    flex: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    cursor: pointer;
  }

  .data-value {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 28px;
    line-height: 1;
    color: var(--cream);
    font-variant-numeric: tabular-nums;
  }
  .set-row.completed .data-value {
    color: var(--dim);
  }
  /* PR numeral — heroGold, set 2 reps */
  .data-value.pr-numeral {
    color: var(--gold);
  }
  .data-value.pr-numeral::before {
    content: '◆ ';
    font-size: 10px;
    vertical-align: middle;
    color: var(--gold);
  }
  /* Active / mid-entry cell */
  .data-value.active {
    color: var(--cream);
    text-shadow: 0 0 12px rgba(179,109,255,0.5);
  }
  .data-unit {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  /* Placeholder dash for empty value */
  .data-placeholder {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 24px;
    color: var(--dim);
    opacity: 0.4;
  }

  /* Complete zone — right tap target */
  .complete-zone {
    width: 56px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-left: 1px solid var(--hair);
  }
  .seal-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .seal-icon.done {
    background: rgba(98,196,109,0.15);
    color: var(--success);
    border: 1.5px solid rgba(98,196,109,0.4);
  }
  .seal-icon.pending {
    border: 1.5px solid var(--hair);
    color: var(--dim);
    opacity: 0.5;
  }

  /* Add series line */
  .add-series-line {
    margin: 6px 16px;
    border: 1.5px dashed rgba(179,109,255,0.25);
    border-radius: 6px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .add-series-line:hover {
    border-color: rgba(179,109,255,0.5);
  }
  .add-series-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--hv);
    opacity: 0.7;
  }
  .add-series-subtext {
    font-size: 10px;
    color: var(--dim);
    margin-left: 8px;
    font-family: 'Inter', sans-serif;
    opacity: 0.6;
  }

  /* Section label — subtle divider above card */
  .section-divider {
    padding: 12px 20px 6px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--hv);
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--hair);
  }

  .scroll-area {
    overflow-y: auto;
    padding-top: 4px;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span>21:46</span>
    <span>LVL 7 · 3-0 🔥</span>
    <span>58%</span>
  </div>

  <div class="appbar">
    <div>
      <div class="appbar-sub">Treino em andamento — 18:42</div>
      <div class="appbar-title">Costas — Semana 3</div>
    </div>
    <div class="appbar-actions">
      <div class="appbar-btn">⋯</div>
      <div class="appbar-btn" style="color: var(--error); font-size:13px; font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:0.06em; width:auto; padding:0 10px;">FIM</div>
    </div>
  </div>

  <div class="scroll-area">
    <div class="section-divider">◆ exercício 1 de 4</div>

    <div class="exercise-card">
      <div class="card-header">
        <div class="exercise-name-row">
          <span class="rune-mark">◆</span>
          <span class="exercise-name">Remada Cavalinho</span>
          <span class="exercise-info">ⓘ</span>
        </div>
        <div class="header-controls">
          <div class="header-icon-btn">⇅</div>
          <div class="header-icon-btn" style="color:var(--error); opacity:0.6;">🗑</div>
        </div>
      </div>

      <div class="sets-body">

        <!-- Set 1: completed -->
        <div class="set-row completed">
          <div class="set-num-col">
            <span class="set-num">1</span>
            <div class="set-num-underline"></div>
            <span class="set-type-glyph">◆ T</span>
          </div>
          <div class="data-cols">
            <div class="weight-col">
              <span class="data-value">20</span>
              <span class="data-unit">kg</span>
            </div>
            <div class="reps-col">
              <span class="data-value">5</span>
              <span class="data-unit">reps</span>
            </div>
          </div>
          <div class="complete-zone">
            <div class="seal-icon done">✓</div>
          </div>
        </div>

        <!-- Set 2: active, PR candidate, mid-entry reps -->
        <div class="set-row" style="background: rgba(106,47,168,0.08);">
          <div class="set-num-col">
            <span class="set-num" style="color:var(--cream);">2</span>
            <div class="set-num-underline"></div>
            <span class="set-type-glyph">◆ T</span>
          </div>
          <div class="data-cols">
            <div class="weight-col">
              <span class="data-value active">22,5</span>
              <span class="data-unit">kg</span>
            </div>
            <div class="reps-col">
              <!-- PR: numeral is gold, no separate badge -->
              <span class="data-value pr-numeral">8</span>
              <span class="data-unit" style="color:var(--gold); opacity:0.8;">PR</span>
            </div>
          </div>
          <div class="complete-zone">
            <div class="seal-icon pending">○</div>
          </div>
        </div>

        <!-- Set 3: pending -->
        <div class="set-row">
          <div class="set-num-col">
            <span class="set-num">3</span>
            <div class="set-num-underline"></div>
            <span class="set-type-glyph">◆ T</span>
          </div>
          <div class="data-cols">
            <div class="weight-col">
              <span class="data-value">20</span>
              <span class="data-unit">kg</span>
            </div>
            <div class="reps-col">
              <span class="data-value">5</span>
              <span class="data-unit">reps</span>
            </div>
          </div>
          <div class="complete-zone">
            <div class="seal-icon pending">○</div>
          </div>
        </div>

      </div><!-- /sets-body -->

      <!-- Add set line -->
      <div class="add-series-line">
        <span class="add-series-text">+ Série</span>
        <span class="add-series-subtext">segure para preencher restantes</span>
      </div>
    </div><!-- /exercise-card -->

    <!-- Ghost of next exercise card for context -->
    <div class="section-divider">◆ exercício 2 de 4</div>
    <div class="exercise-card" style="opacity:0.4;">
      <div class="card-header">
        <div class="exercise-name-row">
          <span class="rune-mark">◆</span>
          <span class="exercise-name">Puxada Frontal</span>
        </div>
        <div class="header-controls">
          <div class="header-icon-btn">⇅</div>
        </div>
      </div>
      <div style="padding:12px 16px;">
        <span style="font-family:'Inter',sans-serif;font-size:12px;color:var(--dim);">4 séries · não iniciado</span>
      </div>
    </div>
  </div><!-- /scroll-area -->
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Direction B — Tactile Data Table</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --abyss:   #0D0319;
    --surface: #1A0F2E;
    --surface2:#241640;
    --pv:      #6A2FA8;
    --hv:      #B36DFF;
    --gold:    #FFB800;
    --cream:   #EEE7FA;
    --dim:     #9C8DB8;
    --success: #62C46D;
    --hair:    rgba(179,109,255,0.14);
    --error:   #FF6B6B;
  }

  body {
    background: #111;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 24px 0;
    font-family: 'Inter', sans-serif;
  }

  .phone-frame {
    width: 390px; min-height: 844px;
    background: var(--abyss);
    border-radius: 44px; overflow: hidden;
    box-shadow: 0 0 0 8px #1a1a1a, 0 24px 80px rgba(0,0,0,0.8);
    padding-bottom: 32px;
  }

  .status-bar {
    height: 44px; background: var(--abyss);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; font-size: 12px; color: var(--cream);
    font-family: 'Inter',sans-serif; font-weight: 600;
  }

  .appbar {
    padding: 0 16px 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .appbar-info {}
  .appbar-timer {
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    font-size: 28px; line-height: 1; color: var(--cream); letter-spacing: 0.02em;
  }
  .appbar-label {
    font-size: 11px; color: var(--dim); text-transform: uppercase;
    letter-spacing: 0.1em; font-weight: 600; margin-top: 2px;
  }
  .finish-btn {
    background: var(--pv);
    color: var(--cream); border: none; border-radius: 10px;
    padding: 0 20px; height: 44px;
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer;
  }

  /* Exercise card */
  .exercise-card {
    margin: 0 12px 16px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--hair);
    overflow: hidden;
  }

  .card-header {
    padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--hair);
  }
  .exercise-name {
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    font-size: 16px; color: var(--cream); letter-spacing: 0.02em;
  }
  .exercise-meta {
    font-size: 11px; color: var(--dim); margin-top: 1px;
  }
  .header-actions {
    display: flex; gap: 0;
  }
  .hdr-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 16px; cursor: pointer; border-radius: 8px;
  }

  /* Column header row */
  .col-header-row {
    display: flex; align-items: center;
    height: 28px;
    border-bottom: 1px solid var(--hair);
    background: rgba(36,22,64,0.4);
  }
  .col-hdr {
    font-family: 'Inter',sans-serif; font-size: 9px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim);
    opacity: 0.7; text-align: center;
  }
  .col-hdr-num { width: 44px; flex-shrink: 0; }
  .col-hdr-weight { flex: 3; }
  .col-hdr-reps { flex: 2; }
  .col-hdr-done { width: 52px; flex-shrink: 0; }

  /* Set rows */
  .set-row {
    display: flex; align-items: stretch;
    min-height: 56px;
    position: relative;
    border-bottom: 1px solid var(--hair);
  }
  .set-row:last-of-type { border-bottom: none; }

  /* Left type border */
  .set-row::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  }
  .set-row.type-working::before { background: var(--pv); }
  .set-row.completed::before { background: var(--success); }
  .set-row.pr-row { background: rgba(255,184,0,0.03); }

  /* Set number col */
  .set-num-col {
    width: 44px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .set-num {
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    font-size: 18px; color: var(--hv); line-height: 1;
  }
  .set-row.completed .set-num { color: var(--dim); }

  /* Weight column — three-zone stepper */
  .stepper-col {
    display: flex; align-items: stretch; border-left: 1px solid var(--hair);
  }
  .stepper-col.weight { flex: 3; }
  .stepper-col.reps { flex: 2; border-right: 1px solid var(--hair); }

  .step-btn {
    width: 40px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--hv); font-size: 20px; cursor: pointer;
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    opacity: 0.7;
    user-select: none;
  }
  .step-btn:active { background: rgba(179,109,255,0.1); }
  /* On 360dp screens, step-btn width compresses — min 40dp set via flex constraints */

  .step-value-zone {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
  }
  .step-value {
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    font-size: 24px; line-height: 1; color: var(--cream);
    font-variant-numeric: tabular-nums;
  }
  .step-value.dim-val { color: var(--dim); }
  .step-value.pr-val { color: var(--gold); }
  .step-unit {
    font-size: 10px; font-weight: 600; color: var(--dim);
    text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px;
  }
  .set-row.completed .step-value { color: var(--dim); opacity: 0.6; }

  /* PR badge above value */
  .pr-badge {
    background: rgba(255,184,0,0.15);
    border: 1px solid rgba(255,184,0,0.4);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'Inter',sans-serif; font-size: 9px; font-weight: 600;
    color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 3px;
  }

  /* Completion column */
  .done-col {
    width: 52px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .done-col.completed { background: rgba(98,196,109,0.08); }
  .done-mark {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
  }
  .done-mark.checked {
    background: rgba(98,196,109,0.2);
    color: var(--success); border: 1.5px solid rgba(98,196,109,0.5);
  }
  .done-mark.unchecked {
    border: 1.5px solid rgba(179,109,255,0.25);
    color: var(--dim); opacity: 0.5;
  }

  /* Footer buttons */
  .card-footer {
    border-top: 1px solid var(--hair);
  }
  .add-series-btn {
    width: 100%; height: 52px;
    background: rgba(106,47,168,0.2);
    border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; gap: 6px;
    transition: background 0.15s;
  }
  .add-series-btn:hover { background: rgba(106,47,168,0.35); }
  .add-series-label {
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--hv);
  }
  .fill-rest-link {
    width: 100%; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 11px; color: var(--dim); font-weight: 600;
    letter-spacing: 0.06em; text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-color: rgba(156,141,184,0.4);
  }

  .scroll-area { overflow-y: auto; padding: 8px 0; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span>21:46</span>
    <span style="color:var(--hv);">LVL 7 · 3-0 🔥</span>
    <span>58%</span>
  </div>

  <div class="appbar">
    <div class="appbar-info">
      <div class="appbar-timer">18:42</div>
      <div class="appbar-label">Costas — Semana 3</div>
    </div>
    <button class="finish-btn">Encerrar</button>
  </div>

  <div class="scroll-area">
    <div class="exercise-card">
      <div class="card-header">
        <div>
          <div class="exercise-name">Remada Cavalinho</div>
          <div class="exercise-meta">3 séries · Costas</div>
        </div>
        <div class="header-actions">
          <div class="hdr-btn">ⓘ</div>
          <div class="hdr-btn">⇅</div>
          <div class="hdr-btn" style="color:var(--error);opacity:0.7;">🗑</div>
        </div>
      </div>

      <div class="col-header-row">
        <div class="col-hdr col-hdr-num">Nº</div>
        <div class="col-hdr col-hdr-weight">Peso</div>
        <div class="col-hdr col-hdr-reps">Reps</div>
        <div class="col-hdr col-hdr-done">OK</div>
      </div>

      <!-- Set 1: completed -->
      <div class="set-row type-working completed">
        <div class="set-num-col"><span class="set-num">1</span></div>
        <div class="stepper-col weight">
          <div class="step-btn">−</div>
          <div class="step-value-zone">
            <span class="step-value">20</span>
            <span class="step-unit">kg</span>
          </div>
          <div class="step-btn">+</div>
        </div>
        <div class="stepper-col reps">
          <div class="step-btn">−</div>
          <div class="step-value-zone">
            <span class="step-value">5</span>
            <span class="step-unit">reps</span>
          </div>
          <div class="step-btn">+</div>
        </div>
        <div class="done-col completed">
          <div class="done-mark checked">✓</div>
        </div>
      </div>

      <!-- Set 2: active, PR candidate -->
      <div class="set-row type-working pr-row">
        <div class="set-num-col"><span class="set-num" style="color:var(--cream);">2</span></div>
        <div class="stepper-col weight">
          <div class="step-btn" style="color:var(--cream); opacity:1;">−</div>
          <div class="step-value-zone" style="background:rgba(179,109,255,0.06);">
            <span class="step-value" style="color:var(--cream); font-size:26px;">22,5</span>
            <span class="step-unit">kg</span>
          </div>
          <div class="step-btn" style="color:var(--cream); opacity:1;">+</div>
        </div>
        <div class="stepper-col reps">
          <div class="step-btn" style="color:var(--gold);">−</div>
          <div class="step-value-zone" style="background:rgba(255,184,0,0.05);">
            <div class="pr-badge">◆ PR</div>
            <span class="step-value pr-val">8</span>
          </div>
          <div class="step-btn" style="color:var(--gold);">+</div>
        </div>
        <div class="done-col">
          <div class="done-mark unchecked">○</div>
        </div>
      </div>

      <!-- Set 3: pending -->
      <div class="set-row type-working">
        <div class="set-num-col"><span class="set-num">3</span></div>
        <div class="stepper-col weight">
          <div class="step-btn">−</div>
          <div class="step-value-zone">
            <span class="step-value">20</span>
            <span class="step-unit">kg</span>
          </div>
          <div class="step-btn">+</div>
        </div>
        <div class="stepper-col reps">
          <div class="step-btn">−</div>
          <div class="step-value-zone">
            <span class="step-value">5</span>
            <span class="step-unit">reps</span>
          </div>
          <div class="step-btn">+</div>
        </div>
        <div class="done-col">
          <div class="done-mark unchecked">○</div>
        </div>
      </div>

      <div class="card-footer">
        <button class="add-series-btn">
          <span style="font-size:18px; color:var(--hv); line-height:1;">+</span>
          <span class="add-series-label">Adicionar Série</span>
        </button>
        <div class="fill-rest-link">Preencher restantes</div>
      </div>
    </div><!-- /exercise-card -->
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Direction C — One-Thumb Focus Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --abyss:   #0D0319;
    --surface: #1A0F2E;
    --surface2:#241640;
    --pv:      #6A2FA8;
    --hv:      #B36DFF;
    --gold:    #FFB800;
    --cream:   #EEE7FA;
    --dim:     #9C8DB8;
    --success: #62C46D;
    --hair:    rgba(179,109,255,0.14);
    --error:   #FF6B6B;
  }

  body {
    background: #111;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 24px 0;
    font-family: 'Inter',sans-serif;
  }

  .phone-frame {
    width: 390px; min-height: 844px;
    background: var(--abyss);
    border-radius: 44px; overflow: hidden;
    box-shadow: 0 0 0 8px #1a1a1a, 0 24px 80px rgba(0,0,0,0.8);
    display: flex; flex-direction: column;
  }

  .status-bar {
    height: 44px; background: var(--abyss);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; font-size: 12px; color: var(--cream); font-weight: 600;
    flex-shrink: 0;
  }

  .appbar {
    padding: 4px 16px 8px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .workout-timer {
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    font-size: 22px; color: var(--cream); letter-spacing: 0.02em;
  }
  .workout-title {
    font-size: 11px; color: var(--dim); text-transform: uppercase;
    letter-spacing: 0.1em; font-weight: 600;
  }
  .end-btn {
    background: transparent; border: 1px solid rgba(255,107,107,0.4);
    color: var(--error); border-radius: 8px; padding: 8px 16px;
    font-family: 'Rajdhani',sans-serif; font-weight: 700; font-size: 13px;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
  }

  /* Exercise progress breadcrumb */
  .exercise-nav {
    padding: 0 16px 8px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .ex-nav-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--pv); flex-shrink: 0;
  }
  .ex-nav-dot.active { background: var(--hv); width: 24px; border-radius: 4px; }
  .ex-nav-dot.done { background: var(--success); }

  /* Main exercise card — takes up remaining space */
  .exercise-card {
    margin: 0 12px;
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--hair);
    display: flex; flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  /* Card header */
  .card-header {
    padding: 16px 16px 12px;
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 1px solid var(--hair);
  }
  .exercise-name {
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    font-size: 20px; color: var(--cream); letter-spacing: 0.02em;
    line-height: 1.1;
  }
  .exercise-sub {
    font-size: 11px; color: var(--dim); margin-top: 3px;
  }
  .header-menu {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 20px; cursor: pointer;
    flex-shrink: 0;
  }

  /* History strip — completed sets */
  .history-strip {
    padding: 10px 14px;
    display: flex; gap: 6px; align-items: center;
    flex-shrink: 0;
    min-height: 52px;
    border-bottom: 1px solid var(--hair);
    overflow-x: auto;
  }
  .history-chip {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(98,196,109,0.1);
    border: 1px solid rgba(98,196,109,0.25);
    border-radius: 8px;
    padding: 6px 10px;
    flex-shrink: 0;
    position: relative;
  }
  .chip-num {
    font-family: 'Inter',sans-serif; font-size: 9px; font-weight: 600;
    color: var(--success); text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  .chip-data {
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    font-size: 14px; color: var(--cream); white-space: nowrap;
  }
  .history-label {
    font-size: 10px; color: var(--dim); font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0;
    margin-right: 2px;
  }

  /* Active set hero display */
  .active-set-hero {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px 0;
    position: relative;
  }

  .set-label {
    font-family: 'Inter',sans-serif; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--hv); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .set-label-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--hv);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Two-column data display */
  .data-row {
    display: flex; width: 100%;
    border-top: 1px solid var(--hair);
    border-bottom: 1px solid var(--hair);
  }

  .data-col {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px 0;
    cursor: pointer;
    position: relative;
  }
  .data-col.weight { border-right: 1px solid var(--hair); }
  .data-col.reps-col { }
  .data-col.reps-col.pr { background: rgba(255,184,0,0.05); }

  /* Swipe hint arrows */
  .swipe-hint-up {
    position: absolute; top: 8px;
    font-size: 10px; color: var(--dim); opacity: 0.4;
  }
  .swipe-hint-down {
    position: absolute; bottom: 8px;
    font-size: 10px; color: var(--dim); opacity: 0.4;
  }

  .data-type-label {
    font-family: 'Inter',sans-serif; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim);
    margin-bottom: 4px;
  }
  .data-type-label.pr-label {
    color: var(--gold); font-size: 10px;
  }
  .pr-label-icon { margin-right: 3px; }

  .big-value {
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    font-size: 64px; line-height: 1; color: var(--cream);
    font-variant-numeric: tabular-nums;
  }
  .big-value.pr-value { color: var(--gold); }

  .data-unit {
    font-family: 'Inter',sans-serif; font-size: 12px; font-weight: 600;
    color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em;
    margin-top: 4px;
  }

  /* Complete set button */
  .complete-btn {
    margin: 0; flex-shrink: 0;
    height: 72px;
    background: linear-gradient(135deg, var(--pv), var(--hv));
    border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; gap: 10px;
  }
  .complete-btn-label {
    font-family: 'Rajdhani',sans-serif; font-weight: 700;
    font-size: 18px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--cream);
  }
  .complete-btn-check {
    width: 28px; height: 28px;
    border-radius: 50%; border: 2px solid rgba(238,231,250,0.6);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--cream);
  }

  /* Progress dots inside card */
  .set-progress {
    display: flex; gap: 6px; align-items: center;
    margin: 10px 0 4px;
  }
  .progress-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .progress-dot.done-dot { background: var(--success); }
  .progress-dot.active-dot { background: var(--hv); width: 20px; border-radius: 4px; }
  .progress-dot.pending-dot { background: var(--hair); border: 1px solid rgba(179,109,255,0.3); }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span>21:46</span>
    <span style="color:var(--hv);">3-0 🔥 LVL 7</span>
    <span>58%</span>
  </div>

  <div class="appbar">
    <div>
      <div class="workout-timer">18:42</div>
      <div class="workout-title">Costas — Semana 3</div>
    </div>
    <button class="end-btn">Encerrar</button>
  </div>

  <!-- Exercise progress breadcrumb -->
  <div class="exercise-nav">
    <div class="ex-nav-dot done"></div>
    <div class="ex-nav-dot active"></div>
    <div class="ex-nav-dot"></div>
    <div class="ex-nav-dot"></div>
    <span style="font-size:10px;color:var(--dim);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-left:4px;">2 de 4</span>
  </div>

  <div class="exercise-card">
    <div class="card-header">
      <div>
        <div class="exercise-name">Remada Cavalinho</div>
        <div class="exercise-sub">Costas · 3 séries</div>
      </div>
      <div class="header-menu">⋯</div>
    </div>

    <!-- Completed sets history strip -->
    <div class="history-strip">
      <span class="history-label">Feito</span>
      <div class="history-chip">
        <span class="chip-num">Série 1</span>
        <span class="chip-data">20 kg × 5</span>
      </div>
      <!-- Set 3 not yet done — shown as pending ghost -->
      <div class="history-chip" style="background:transparent;border:1px dashed rgba(179,109,255,0.2);opacity:0.5;">
        <span class="chip-num" style="color:var(--dim);">Série 3</span>
        <span class="chip-data" style="color:var(--dim);">20 kg × 5</span>
      </div>
    </div>

    <!-- Active set hero -->
    <div class="active-set-hero">
      <div class="set-label">
        <div class="set-label-dot"></div>
        Série 2 em andamento
      </div>

      <!-- Set progress indicator -->
      <div class="set-progress">
        <div class="progress-dot done-dot"></div>
        <div class="progress-dot active-dot"></div>
        <div class="progress-dot pending-dot"></div>
      </div>

      <!-- Big data display -->
      <div class="data-row" style="margin-top:16px;">
        <div class="data-col weight">
          <span class="swipe-hint-up">▲</span>
          <span class="data-type-label">Peso</span>
          <span class="big-value">22,5</span>
          <span class="data-unit">kg</span>
          <span class="swipe-hint-down">▼</span>
        </div>
        <div class="data-col reps-col pr">
          <span class="swipe-hint-up" style="color:var(--gold);opacity:0.5;">▲</span>
          <span class="data-type-label pr-label"><span class="pr-label-icon">◆</span>Recorde</span>
          <span class="big-value pr-value">8</span>
          <span class="data-unit" style="color:var(--gold);opacity:0.8;">reps</span>
          <span class="swipe-hint-down" style="color:var(--gold);opacity:0.5;">▼</span>
        </div>
      </div>
    </div>

    <!-- Complete button — anchored to card bottom, 72dp tall -->
    <button class="complete-btn">
      <div class="complete-btn-check">✓</div>
      <span class="complete-btn-label">Concluir Série</span>
    </button>
  </div><!-- /exercise-card -->

  <div style="padding:10px 16px 0; display:flex; align-items:center; justify-content:center;">
    <span style="font-size:11px;color:var(--dim);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;opacity:0.7;">
      segure para preencher restantes
    </span>
  </div>
</div>
</body>
</html>

name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'
          cache: true
          cache-key: flutter-${{ runner.os }}-3.41.6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: test/e2e/package-lock.json

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Cache Playwright browser binaries. Key includes the Playwright version
      # so the cache is invalidated when @playwright/test is upgraded.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('test/e2e/package-lock.json') }}

      # Cache Flutter pub packages. Key is the pubspec.lock so a lockfile change
      # triggers a fresh download; otherwise we get a full cache hit.
      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      # Cache the Flutter web build output. Cache key covers all Dart/Flutter
      # source files so any code change busts it automatically.
      - name: Cache Flutter web build
        id: web-build-cache
        uses: actions/cache@v4
        with:
          path: build/web
          key: web-build-${{ runner.os }}-${{ hashFiles('lib/**', 'pubspec.lock', 'web/**') }}

      - name: Start local Supabase
        run: supabase start

      - name: Extract Supabase keys and write env files
        run: |
          supabase status -o env > /tmp/sb_status.env
          SB_URL=$(grep '^API_URL=' /tmp/sb_status.env | cut -d= -f2-)
          SB_ANON=$(grep '^ANON_KEY=' /tmp/sb_status.env | cut -d= -f2-)
          SB_SERVICE=$(grep '^SERVICE_ROLE_KEY=' /tmp/sb_status.env | cut -d= -f2-)

          echo "--- Supabase API URL: $SB_URL ---"

          # Flutter app .env (loaded by flutter_dotenv at runtime)
          printf "SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\n" "$SB_URL" "$SB_ANON" > .env

          # Playwright .env.local (loaded by global-setup.ts)
          printf "FLUTTER_APP_URL=http://localhost:8080\nSUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\nTEST_USER_PASSWORD=TestPassword123!\n" "$SB_URL" "$SB_ANON" "$SB_SERVICE" > test/e2e/.env.local

      - name: Verify Supabase is healthy
        run: |
          curl -sf http://127.0.0.1:54321/auth/v1/settings && echo "Auth endpoint OK" || echo "Auth endpoint FAILED"
          curl -sf http://localhost:54321/auth/v1/settings && echo "Auth (localhost) OK" || echo "Auth (localhost) FAILED"
          cat .env | head -1

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Flutter web
        if: steps.web-build-cache.outputs.cache-hit != 'true'
        run: |
          flutter build web \
            --release \
            --web-renderer html \
            --no-tree-shake-icons \
            --no-web-resources-cdn

      - name: Verify .env in build output
        run: |
          # flutter_dotenv loads .env from the asset bundle. In web builds,
          # assets are bundled into build/web/assets/. Verify it's there.
          if [ -f build/web/assets/AssetManifest.json ]; then
            grep -q '\.env' build/web/assets/AssetManifest.json && echo ".env found in AssetManifest" || echo ".env NOT in AssetManifest"
          fi
          ls -la build/web/assets/.env 2>/dev/null || echo ".env not at build/web/assets/.env"
          ls -la build/web/assets/AssetManifest.bin 2>/dev/null || true

      - name: Serve Flutter web app
        run: |
          # python3 http.server serves ALL files including dotfiles (.env).
          # npx serve -s hides dotfiles, causing dotenv.load() to fail.
          cd build/web && python3 -m http.server 8080 &
          npx wait-on http://localhost:8080 --timeout 30000

      - name: Install Playwright dependencies
        working-directory: test/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: test/e2e
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser system deps (cache hit)
        working-directory: test/e2e
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright smoke tests (PR)
        if: github.event_name == 'pull_request'
        working-directory: test/e2e
        run: npx playwright test --project=smoke --reporter=line

      - name: Run Playwright full test suite (push to main)
        if: github.event_name == 'push'
        working-directory: test/e2e
        run: npx playwright test --reporter=line

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            test/e2e/playwright-report/
            test/e2e/test-results/
          retention-days: 7
